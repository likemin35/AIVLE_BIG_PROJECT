server:
  port: ${PORT:8080}

spring:
  application:
    name: user

  mail:
    host: smtp.gmail.com
    port: 587
    username: "이메일 입력해주세요"
    password: "비밀번호 입력해주세요"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

---

spring:
  profiles: default

  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        implicit_naming_strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyComponentPathImpl

logging:
  level:
    org.hibernate.type: trace
    org.springframework.cloud: debug

server:
  port: 8084

POINT_SERVICE_BASE_URL: ${POINT_SERVICE_BASE_URL:http://localhost:8085}
POINT_SERVICE_CONNECT_TIMEOUT_MS: ${POINT_SERVICE_CONNECT_TIMEOUT_MS:3000}
POINT_SERVICE_READ_TIMEOUT_MS: ${POINT_SERVICE_READ_TIMEOUT_MS:10000}
INTERNAL_CALLBACK_TOKEN: ${INTERNAL_CALLBACK_TOKEN:}

firebase:
  email-verification-url: "http://localhost:8088/api/auth/verify-email"

---

spring:
  profiles: docker

firebase:
  email-verification-url: "https://your-frontend-url/api/auth/verify-email"
