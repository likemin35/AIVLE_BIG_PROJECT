server:
  port: ${PORT:8080}

spring:
  application:
    name: user

  mail:
    host: smtp.gmail.com
    port: 587
    username: "이메일 입력해주세요"
    password: "비밀번호 입력해주세요"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

---

spring:
  profiles: default

  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        implicit_naming_strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyComponentPathImpl

  cloud:
    stream:
      kafka:
        binder:
          brokers: localhost:9092
      bindings:
        event-in:
          group: user
          destination: self
          contentType: application/json
        event-out:
          destination: self
          contentType: application/json

logging:
  level:
    org.hibernate.type: trace
    org.springframework.cloud: debug

firebase:
  email-verification-url: "http://localhost:8088/api/auth/verify-email"

---

spring:
  profiles: docker

  cloud:
    stream:
      kafka:
        binder:
          brokers: dummy:9092
      bindings:
        event-in:
          group: user
          destination: self
          contentType: application/json
        event-out:
          destination: self
          contentType: application/json

firebase:
  email-verification-url: "https://your-frontend-url/api/auth/verify-email"
