server:
  port: 8088

# Firebase 설정
firebase:
  secret-id: "firebase-adminsdk"
  database-url: "aivle-team0721"
  project-id: "aivle-team0721"

---

spring:
  profiles: default
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods: [ GET, POST, PUT, DELETE, OPTIONS ]
            allowedHeaders: "*"
            allowCredentials: true

      # ⬇️ 중복 CORS 응답 헤더 제거 (게이트웨이 값을 마지막으로 유지)
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin,RETAIN_LAST

      # <<< API Gateway / Routes
      routes:
        - id: keywords-ner
          uri: http://localhost:8081
          predicates:
            - Path=/ner/**
          filters:
            - StripPrefix=1

        - id: keywords-ai
          uri: http://localhost:8080
          predicates:
            - Path=/keywords/**
          filters:
            - StripPrefix=1

        - id: keyword-graph
          uri: http://localhost:8080
          predicates:
            - Path=/graph,/graph/**
          filters:
            - StripPrefix=1

        - id: image
          uri: http://localhost:8080
          predicates:
            - Path=/image,/image/**
          filters:
            - StripPrefix=1

        - id: term
          uri: http://localhost:8083
          predicates:
            # ⬇️ 정확 경로 + 와일드카드 모두
            - Path=/terms,/terms/**,/getTerms,/getTerms/**

        - id: point
          uri: http://localhost:8085
          predicates:
            # ⬇️ 기존 오타(/terms...) 교정
            - Path=/points,/points/**,/getPoints,/getPoints/**

        - id: point-api
          uri: http://localhost:8085
          predicates:
            - Path=/api/points,/api/points/**

        - id: user
          uri: http://localhost:8084
          predicates:
            - Path=/api/users/**,/api/auth/**,/users/**

        - id: qna
          uri: http://localhost:8086
          predicates:
            - Path=/qna/**

        # ⛳️ 프론트 SPA
        - id: frontend
          uri: http://localhost:3000
          predicates:
            - Path=/**
      # >>> API Gateway / Routes

---

spring:
  profiles: docker
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            # 배포에선 환경변수로 프론트 도메인 주입 (예: https://app.example.com)
            allowedOrigins: "${FRONTEND_URL:http://localhost:3000}"
            allowedMethods: [ GET, POST, PUT, DELETE, OPTIONS ]
            allowedHeaders: "*"
            allowCredentials: true

      # ⬇️ 배포도 동일하게 중복 제거
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin,RETAIN_LAST

      routes:
        - id: keywords-ner
          uri: ${KEYWORD_NER_SERVICE_URL:http://keywordner:8080}
          predicates:
            - Path=/ner/**
          filters:
            - StripPrefix=1

        - id: keywords-ai
          uri: ${KEYWORD_AI_SERVICE_URL:http://keywordai:8080}
          predicates:
            - Path=/keywords/**
          filters:
            - StripPrefix=1

        - id: keyword-graph
          uri: ${KEYWORD_GRAPH_SERVICE_URL:http://keywordgraph:8080}
          predicates:
            - Path=/graph,/graph/**
          filters:
            - StripPrefix=1

        - id: image
          uri: ${IMAGE_SERVICE_URL:http://image:8080}
          predicates:
            - Path=/image,/image/**
          filters:
            - StripPrefix=1

        - id: term
          uri: ${TERM_SERVICE_URL:http://term:8080}
          predicates:
            # ⬇️ 정확 경로까지 포함
            - Path=/terms,/terms/**

        - id: point
          uri: ${POINT_SERVICE_URL:http://point:8080}
          predicates:
            - Path=/points/**

        - id: point-api
          uri: ${POINT_SERVICE_URL:http://point:8080}
          predicates:
            - Path=/api/points,/api/points/**

        - id: user
          uri: ${USER_SERVICE_URL:http://user:8080}
          predicates:
            - Path=/api/users/**,/api/auth/**,/users/**

        - id: qna
          uri: ${QNA_SERVICE_URL:http://qna:8080}
          predicates:
            - Path=/qna/**

        - id: frontend
          uri: ${FRONT_SERVICE_URL:http://frontend:8080}
          predicates:
            - Path=/**

server:
  port: 8080
