# 기본 설정 (Docker 환경에서 사용)
server:
  port: ${PORT:8080}

spring:
  application:
    name: point

# Firebase 설정
firebase:
  secret-id: "firebase-adminsdk"
  project-id: "aivle-team0721" # 실제 프로젝트 ID로 변경해주세요

INTERNAL_CALLBACK_TOKEN: ${INTERNAL_CALLBACK_TOKEN:}

---

# 로컬 개발 환경 (default profile)
spring:
  profiles: default

logging:
  level:
    org.springframework.cloud: debug

management:
  endpoints:
    web:
      cors:
        allowed-origins: "*"
        allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
        allowed-headers: "*"

server:
  port: 8085 # 로컬 개발용 포트

---

# Docker 환경 (docker profile)
spring:
  profiles: docker
